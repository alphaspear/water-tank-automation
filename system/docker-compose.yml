services:

  water-tank-automation:

    build: .

    container_name: water-tank-automation

    restart: unless-stopped

    network_mode: host

    environment:
      TZ: Asia/Kolkata

    volumes:
      - ./:/app

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3